<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>作战大屏</title>
    <link rel="stylesheet" href="/styles.css?v=20260724-screen-avatar-smooth" />
  </head>
  <body class="screen-body">
    <main class="public-screen">
      <div class="battle-screen">
        <div class="battle-frame battle-frame-top"></div>
        <div class="battle-frame battle-frame-bottom"></div>
        <div class="battle-outer-frame" aria-hidden="true"></div>
        <div class="screen-tools">
          <button class="screen-tool hidden" id="screen-audio-toggle" type="button" aria-label="播放背景音频">♪</button>
          <button class="screen-tool" id="screen-fullscreen" type="button" aria-label="全屏">⛶</button>
        </div>
        <header class="battle-title">
          <h1 id="battle-title">活动作战大屏</h1>
        </header>
        <section class="battle-layout">
          <aside class="battle-left">
            <div class="battle-panel battle-kpi">
              <h3 id="battle-campaign-name">必火次元</h3>
              <div class="battle-countdown">
                <span>倒计时:</span>
                <strong id="battle-countdown">00天00:00:00</strong>
              </div>
              <div class="battle-kpi-grid">
                <div class="battle-stats battle-stats-left" id="battle-stats-left"></div>
                <div class="battle-core">
                  <div class="battle-orbit">
                    <span></span>
                    <strong>V</strong>
                  </div>
                </div>
                <div class="battle-stats battle-stats-right" id="battle-stats-right"></div>
              </div>
            </div>
            <div class="battle-panel battle-split-panel">
              <div class="battle-panel-title">裂变分析</div>
              <div class="battle-bars" id="battle-split-analysis"></div>
            </div>
          </aside>
          <main class="battle-center">
            <div class="battle-panel">
              <div class="battle-panel-title" id="battle-entry-title">正在浏览</div>
              <div class="battle-table battle-live" id="battle-recent-entries"></div>
            </div>
            <div class="battle-panel">
              <div class="battle-panel-title" id="battle-order-title">最近下单</div>
              <div class="battle-table battle-orders" id="battle-recent-orders"></div>
            </div>
          </main>
          <aside class="battle-right">
            <div class="battle-panel">
              <div class="battle-panel-title">粉丝排行榜</div>
              <div class="battle-rank" id="battle-fan-rank"></div>
            </div>
            <div class="battle-panel">
              <div class="battle-panel-title">收益排行榜</div>
              <div class="battle-rank" id="battle-earning-rank"></div>
            </div>
          </aside>
        </section>
        <audio id="screen-audio" autoplay loop preload="auto"></audio>
      </div>
    </main>
    <script src="/screen.js?v=20260724-screen-light-panels-avatar"></script>
  </body>
</html>
