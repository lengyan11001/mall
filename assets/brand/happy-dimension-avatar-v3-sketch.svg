  <path d="M28 173C112 98 130 119 190 142c63 24 86 84 166 83 77-2 123 57 217 25 80-28 112-80 202-44 77 31 122 80 222 35"
        fill="none" stroke="#00D9FF" stroke-width="8" stroke-linecap="round" opacity=".34"/>

  <g filter="url(#shadow)">
    <path d="M328 618C391 548 466 553 534 631c21 23 35 34 51 34 19 0 29-19 48-38 52-52 119-54 189-6"
          fill="none" stroke="#233755" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#rough)"/>
    <path d="M325 620C382 544 428 508 468 421c26-58 46-105 81-133 25 36 43 86 56 142 12 55 27 105 59 147"
          fill="none" stroke="#233755" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#rough)"/>
    <path d="M340 617C399 559 464 565 526 637c24 28 42 42 63 40 23-3 35-21 56-39 48-42 107-43 166-2"
