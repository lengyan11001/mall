  </g>

  <text x="512" y="762" text-anchor="middle"
        font-family="Ink Free, Segoe Script, Comic Sans MS, Microsoft YaHei UI, sans-serif"
        font-size="126"
        font-weight="700"
        fill="#233755"
        letter-spacing="2"
        filter="url(#rough)">BiHuoCY</text>
  <text x="512" y="838" text-anchor="middle"
        font-family="Microsoft YaHei UI, Microsoft YaHei, SimHei, sans-serif"
        font-size="42"
        font-weight="800"
        letter-spacing="10"
        fill="#4D6078">必火次元</text>

  <circle cx="217" cy="783" r="31" fill="#00D9FF" opacity=".9"/>
