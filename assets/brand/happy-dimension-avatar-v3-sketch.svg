<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="必火次元 BiHuoCY 草稿风头像">
  <defs>
    <linearGradient id="paper" x1="90" y1="64" x2="940" y2="970" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FBF7"/>
      <stop offset=".52" stop-color="#EEF3EF"/>
      <stop offset="1" stop-color="#F7F3EC"/>
    </linearGradient>
    <linearGradient id="accent" x1="294" y1="306" x2="760" y2="727" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00D9FF"/>
      <stop offset=".46" stop-color="#7A5CFF"/>
      <stop offset="1" stop-color="#FF3BA7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#12203A" flood-opacity=".16"/>
    </filter>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#paper)"/>
  <path d="M0 154C71 69 86 69 132 98c45 28 64 82 126 89 71 9 104 78 184 62 104-20 123-87 222-64 80 19 105 75 202 58 71-12 103-52 158-41"
